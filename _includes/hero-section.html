<!-- hero area -->
<section class="hero-area bg-gold" id="parallax">
  <div class="container">
    <div class="row">
      <div class="col-lg-20 mx-auto">
        <h1 class="font-tertiary" style="color: white; background-color: #11228e; padding: 20px; opacity: 70%;">{{ site.data.settings.hero.hero-title }}</h1>
      </div>
    </div>
  </div>
  <!-- social icon -->
  <ul class="list-unstyled ml-5 mt-3 position-relative zindex-1">
    {% for social in site.data.settings.social %}
    <li class="mb-3"><a class="text-white" href="{{ social.link }}"><i class="{{ social.icon }}"></i></a></li>
    {% endfor %}
  </ul>
  <!-- /social icon -->
</section>
<!-- /hero area -->
